name: Setup a job that uses Nix
description: A set of steps to setup a Github Actions job with Nix
inputs:
  git_https_token:
    description: Optional Github Access Token to rewrite git URLs to use HTTPS with
      authentication. If not provided, it will rewrite to standard HTTPS URLs
      without authentication.
    required: false
  nix_version:
    description: The version of Nix to install. Defaults to the latest stable version.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Rewrite SSH → HTTPS git URLs
      shell: bash
      run: |
        git config --global url."https://github.com/".insteadOf "git@github.com:"
        git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

    - name: Setup credential helper for token authentication
      if: ${{ inputs.git_https_token }}
      shell: bash
      run: |
        git config --global credential.helper "store --file=$HOME/.git-credentials"
        echo "https://x-access-token:${{ inputs.git_https_token }}@github.com" > $HOME/.git-credentials

    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        submodules: recursive

    - name: Install Nix (specific version)
      uses: nixbuild/nix-quick-install-action@2c9db80fb984ceb1bcaa77cdda3fdf8cfba92035 # v34
      if: ${{ inputs.nix_version != '' }}
      with:
        nix_version: ${{ inputs.nix_version }}
        nix_conf: |
          system-features = nixos-test benchmark big-parallel uid-range kvm

    - name: Install Nix (latest stable)
      uses: nixbuild/nix-quick-install-action@2c9db80fb984ceb1bcaa77cdda3fdf8cfba92035 # v34
      if: ${{ inputs.nix_version == '' }}
      with:
        nix_conf: |
          system-features = nixos-test benchmark big-parallel uid-range kvm
