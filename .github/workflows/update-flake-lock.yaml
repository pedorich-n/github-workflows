name: Update flake.lock
on:
  workflow_call:
    inputs:
      nix_version:
        required: false
        type: string
        default: ""
      app_client_id:
        description: The Github App ClientID to authenticate with. If provided, it will
          be used to generate a token for git authentication.
        required: false
        type: string
        default: ""
      app_owner:
        description: If provided, the token will be issued for all repositories in the
          owner (user or organization). If not provided, the token will be
          issued for the repository of the workflow that calls this action.
        required: false
        type: string
        default: ""
      app_repositories:
        description: Comma or newline-separated list of repositories to grant the token
          access to (defaults to current repository if owner is unset)
        required: false
        type: string
        default: ""
    secrets:
      app_private_key:
        description: The private key of the Github App, in PEM format. If provided, it
          will be used to generate a token for git authentication.
        required: false

jobs:
  update-flake-lock:
    runs-on: ubuntu-latest
    steps:
      - name: Get Github App info
        if: ${{ inputs.app_client_id != '' }}
        id: app_auth
        uses: pedorich-n/github-workflows/.github/actions/app-token@49b512bbb8bc337ceac27bee872950d6fa79cb2e # main
        with:
          client_id: ${{ inputs.app_client_id }}
          private_key: ${{ secrets.app_private_key }}
          owner: ${{ inputs.app_owner }}
          repositories: ${{ inputs.app_repositories }}

      - name: Setup job
        uses: pedorich-n/github-workflows/.github/actions/setup-nix-job@49b512bbb8bc337ceac27bee872950d6fa79cb2e # main
        with:
          nix_version: ${{ inputs.nix_version }}
          git_https_token: ${{ steps.app_auth.outputs.token }}

      - name: Update flake.lock (using Github App)
        if: ${{ steps.app_auth.outputs.token }}
        uses: DeterminateSystems/update-flake-lock@834c491b2ece4de0bbd00d85214bb5e83b4da5c6 # v28
        with:
          token: ${{ steps.app_auth.outputs.token }}
          branch: update_flake_lock_action
          git-author-name: ${{ steps.app_auth.outputs.user_name }}
          git-author-email: ${{ steps.app_auth.outputs.user_email }}
          git-committer-name: ${{ steps.app_auth.outputs.user_name }}
          git-committer-email: ${{ steps.app_auth.outputs.user_email }}
          pr-title: "Update flake.lock"
          pr-labels: |
            dependencies
            automated

      - name: Update flake.lock (without token)
        if: ${{ !steps.app_auth.outputs.token }}
        uses: DeterminateSystems/update-flake-lock@834c491b2ece4de0bbd00d85214bb5e83b4da5c6 # v28
        with:
          branch: update_flake_lock_action
          pr-title: "Update flake.lock"
          pr-labels: |
            dependencies
            automated
