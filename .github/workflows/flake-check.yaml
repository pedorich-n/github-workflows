name: Nix Flake Check
on:
  workflow_call:
    inputs:
      timeout_minutes:
        required: false
        type: number
        default: 10
      nix_version:
        required: false
        type: string
        default: ""
    secrets:
      git_https_token:
        required: false
        description: Github Access Token to rewrite git URLs to use HTTPS with
          authentication. If not provided, it will rewrite to standard HTTPS
          URLs without authentication.
      ssh_key:
        required: false

jobs:
  nix-flake-check:
    timeout-minutes: ${{ inputs.timeout_minutes }}
    runs-on: ubuntu-latest
    steps:
      - name: Setup job
        uses: pedorich-n/github-workflows/.github/actions/setup-nix-job@main
        with:
          ssh_key: ${{ secrets.ssh_key }}
          nix_version: ${{ inputs.nix_version }}
          git_https_token: ${{ secrets.git_https_token }}
      - name: Flake Check
        run: nix flake check
